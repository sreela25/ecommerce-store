<!DOCTYPE html>
<html>

<head>
    <title>Admin Panel</title>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <nav>

        <h2>E-Commerce Store</h2>

        <div>

            <a href="products.html">Products</a>

            <a href="cart.html">Cart</a>

            <a href="orders.html">Orders</a>

            <a href="admin.html" id="adminLink">Admin</a>

            <button onclick="logout()">
                Logout
            </button>

        </div>

    </nav>

    <div class="dashboard">

    <div class="stat-card">
        <h3>Total Products</h3>
        <h2 id="productCount">0</h2>
    </div>

    <div class="stat-card">
        <h3>Total Orders</h3>
        <h2 id="orderCount">0</h2>
    </div>

    <div class="stat-card">
    <h3>Total Revenue</h3>
    <h2 id="revenue">0</h2>
</div>

<div class="stat-card">

    <h3>Total Users</h3>

    <h2 id="userCount">
        0
    </h2>

</div>

</div>

<div class="chart-container">

    <canvas id="revenueChart"></canvas>

</div>

    <div class="auth-container">

        <div class="auth-card">

            <h2>Add Product</h2>

            <input type="text"
                   id="name"
                   placeholder="Product Name">

            <input type="text"
                   id="description"
                   placeholder="Description">

            <input type="number"
                   id="price"
                   placeholder="Price">

            <input type="text"
                   id="category"
                   placeholder="Category">

            <input type="number"
                   id="stock"
                   placeholder="Stock">

            <input type="text"
                    id="image"
                    placeholder="Image URL">

            <button onclick="addProduct()">
                Add Product
            </button>

        </div>

    </div>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="script.js"></script>

</body>

</html>
