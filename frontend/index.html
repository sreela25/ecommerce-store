<!DOCTYPE html>
<html>

<head>
    <title>Login</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="auth-container">

        <div class="auth-card">

            <h2>Login</h2>

            <input type="email"
                   id="email"
                   placeholder="Enter Email">

            <input type="password"
                   id="password"
                   placeholder="Enter Password">

            <button onclick="login()">
                Login
            </button>

            <p>
                Don't have an account?
                <a href="register.html">
                    Register
                </a>
            </p>

        </div>

    </div>

    <script src="script.js"></script>

</body>

</html>
